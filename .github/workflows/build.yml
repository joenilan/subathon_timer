name: Desktop Checks

on:
  push:
    branches:
      - main
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'README.md'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'README.md'

jobs:
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test

      - name: Build frontend
        run: bun run build

      - name: Check version sync
        run: bun run version:check

  native-check:
    name: Native Check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Cargo check
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml
